<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:#fff;
    width:100%;
    max-width:420px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 15px 30px rgba(0,0,0,.2);
}
h2{text-align:center;margin-bottom:20px}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:12px;
    background:#667eea;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">
<h2>Reset Password</h2>

<div id="emailBox">
<input id="email" type="email" placeholder="Enter Email">
<button onclick="sendOTP()">Send OTP</button>
</div>

<div id="otpBox" class="hidden">
<input id="otp" placeholder="OTP">
<input id="new_password" type="password" placeholder="New Password">
<input id="confirm_password" type="password" placeholder="Confirm Password">
<button onclick="resetPassword()">Reset Password</button>
</div>
</div>

<script>
async function sendOTP(){
    await fetch("/auth/forgot-password",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email.value})
    });
    emailBox.classList.add("hidden");
    otpBox.classList.remove("hidden");
}

async function resetPassword(){
    await fetch("/auth/verify-reset-otp",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({otp:otp.value})
    });

    const res = await fetch("/auth/reset-password",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            new_password:new_password.value,
            confirm_password:confirm_password.value
        })
    });

    const data = await res.json();
    if(data.success){
        alert("Password reset successful!");
        window.location="/auth/login";
    }else alert(data.error);
}
</script>
</body>
</html>
